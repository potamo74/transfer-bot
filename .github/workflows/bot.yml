name: Transfer Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      
    steps:
      - name: Hämta koden
        uses: actions/checkout@v3

      - name: Installera Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installera bibliotek
        run: pip install requests

      - name: Installera bibliotek
        run: pip install requests python-dotenv

      - name: Kör boten
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: python transfer_bot.py

      - name: Spara historik (Commit)
        run: |
          git config user.name "TransferBot"
          git config user.email "bot@transfer.com"
          git add -f sent.json
          git commit -m "Uppdaterad historik" || echo "Inget nytt att spara"
          git push